set_timer:
  name: Set Timer
  description: Create a countdown timer on the display.
  fields:
    device_id:
      name: Display
      description: The HA Smart Display to send the timer to.
      required: true
      selector:
        device:
          integration: ha_smart_display
    timer_id:
      name: Timer ID
      description: Unique identifier for this timer. Use the same ID to update or dismiss it.
      required: true
      example: pasta_timer
      selector:
        text:
    duration_seconds:
      name: Duration (seconds)
      description: How long the timer should run.
      required: true
      example: 300
      selector:
        number:
          min: 1
          max: 86400
          unit_of_measurement: seconds
    label:
      name: Label
      description: Display label shown on the timer (e.g. "Pasta").
      required: false
      default: Timer
      example: Pasta
      selector:
        text:

dismiss_timer:
  name: Dismiss Timer
  description: Remove a timer from the display.
  fields:
    device_id:
      name: Display
      description: The HA Smart Display to dismiss the timer on.
      required: true
      selector:
        device:
          integration: ha_smart_display
    timer_id:
      name: Timer ID
      description: ID of the timer to dismiss.
      required: true
      example: pasta_timer
      selector:
        text:

set_alarm:
  name: Set Alarm
  description: Create an alarm on the display that triggers at a specific time.
  fields:
    device_id:
      name: Display
      description: The HA Smart Display to send the alarm to.
      required: true
      selector:
        device:
          integration: ha_smart_display
    alarm_id:
      name: Alarm ID
      description: Unique identifier for this alarm.
      required: true
      example: morning_alarm
      selector:
        text:
    time:
      name: Time
      description: Time to trigger the alarm in HH:MM format.
      required: true
      example: "07:30"
      selector:
        time:
    label:
      name: Label
      description: Display label shown on the alarm (e.g. "Wake up").
      required: false
      default: Alarm
      example: Wake up
      selector:
        text:

dismiss_alarm:
  name: Dismiss Alarm
  description: Remove an alarm from the display.
  fields:
    device_id:
      name: Display
      description: The HA Smart Display to dismiss the alarm on.
      required: true
      selector:
        device:
          integration: ha_smart_display
    alarm_id:
      name: Alarm ID
      description: ID of the alarm to dismiss.
      required: true
      example: morning_alarm
      selector:
        text:

set_photos:
  name: Set Photos
  description: Update the photo slideshow URLs on the display.
  fields:
    device_id:
      name: Display
      description: The HA Smart Display to update photos on.
      required: true
      selector:
        device:
          integration: ha_smart_display
    urls:
      name: Photo URLs
      description: List of image URLs to cycle through as a slideshow on the clock screen.
      required: true
      example:
        - https://example.com/photo1.jpg
        - https://example.com/photo2.jpg
      selector:
        object:

send_notification:
  name: Send Notification
  description: Show a transient notification overlay on the display.
  fields:
    device_id:
      name: Display
      description: The HA Smart Display to send the notification to.
      required: true
      selector:
        device:
          integration: ha_smart_display
    title:
      name: Title
      description: Notification title shown in bold.
      required: false
      default: ""
      example: Front Door
      selector:
        text:
    message:
      name: Message
      description: Notification body text.
      required: false
      default: ""
      example: Motion detected
      selector:
        text:
    image_url:
      name: Image URL
      description: Optional URL of an image to show in the notification.
      required: false
      example: https://example.com/snapshot.jpg
      selector:
        text:
    duration:
      name: Duration (seconds)
      description: How long to show the notification before auto-dismissing.
      required: false
      default: 10
      example: 10
      selector:
        number:
          min: 1
          max: 300
          unit_of_measurement: seconds
    style:
      name: Style
      description: Visual style of the notification.
      required: false
      default: dialog
      selector:
        select:
          options:
            - label: Dialog (modal card)
              value: dialog
            - label: Toast (pill at bottom)
              value: toast
            - label: Banner (slides from top)
              value: banner
    position:
      name: Position
      description: "Dialog only: where on screen to show the card."
      required: false
      default: center
      selector:
        select:
          options:
            - label: Centre
              value: center
            - label: Top Left
              value: top_left
            - label: Top Centre
              value: top_center
            - label: Top Right
              value: top_right
            - label: Bottom Left
              value: bottom_left
            - label: Bottom Centre
              value: bottom_center
            - label: Bottom Right
              value: bottom_right
    tap_action:
      name: Tap Action
      description: "Dialog only: if set, tapping the card fires ha_smart_display_notification_action with this value as the button label (index -1). Leave empty for no tap action."
      required: false
      example: view
      selector:
        text:
    buttons:
      name: Buttons
      description: Optional list of button labels. When pressed, fires a ha_smart_display_notification_action event with device_id, button label, and index. Not shown for toast style.
      required: false
      example:
        - Confirm
        - Dismiss
      selector:
        object:
    sound:
      name: Sound
      description: Whether to play a notification sound on the device. Defaults to true.
      required: false
      default: true
      selector:
        boolean:

show_camera_stream:
  name: Show Camera Stream
  description: Open a live full-screen camera view on the display.

  fields:
    device_id:
      name: Display
      description: The HA Smart Display to open the camera on.
      required: true
      selector:
        device:
          integration: ha_smart_display
    camera_entity:
      name: Camera
      description: The camera entity to show.
      required: true
      selector:
        entity:
          domain: camera
    stream_type:
      name: Stream Type
      description: "Type of camera stream: snapshot (1fps JPEG, default), video (live video, no audio), or video_audio (live video with audio). Video types require Frigate URL configured and a go2rtc stream for the camera."
      required: false
      default: snapshot
      selector:
        select:
          options:
            - label: Snapshot (1fps JPEG)
              value: snapshot
            - label: Video (no audio)
              value: video
            - label: Video with Audio
              value: video_audio
    duration:
      name: Duration
      description: Optional. Auto-close the camera view after this many seconds.
      required: false
      selector:
        number:
          min: 1
          max: 3600
          unit_of_measurement: seconds

close_camera_stream:
  name: Close Camera Stream
  description: Close the full-screen camera view on the display.
  fields:
    device_id:
      name: Display
      description: The HA Smart Display to close the camera on.
      required: true
      selector:
        device:
          integration: ha_smart_display

add_pill:
  name: Add Pill
  description: Show a pill (chip) on the display. Use the same pill_id to update an existing pill.
  fields:
    device_id:
      name: Display
      description: The HA Smart Display to show the pill on.
      required: true
      selector:
        device:
          integration: ha_smart_display
    pill_id:
      name: Pill ID
      description: Unique identifier for this pill. Use the same ID to update or remove it.
      required: true
      example: front_door
      selector:
        text:
    text:
      name: Text
      description: Text to display inside the pill.
      required: true
      example: Front Door open
      selector:
        text:
    icon:
      name: Icon
      description: Optional icon to show inside the pill.
      required: false
      selector:
        select:
          options:
            - label: Door
              value: door
            - label: Motion
              value: motion
            - label: Warning
              value: warning
            - label: Info
              value: info
            - label: Check
              value: check
            - label: Alert
              value: alert
            - label: Camera
              value: camera
            - label: Lock
              value: lock
            - label: Temperature
              value: temperature
            - label: Person
              value: person
    color:
      name: Background Color
      description: "Optional background colour as a hex string (e.g. #FF5733). Leave blank for default semi-transparent white."
      required: false
      example: "#FF5733"
      selector:
        text:
    position:
      name: Position
      description: Where on screen to show the pill.
      required: false
      default: under_clock
      selector:
        select:
          options:
            - label: Under Clock
              value: under_clock
            - label: Top Left
              value: top_left
            - label: Top Centre
              value: top_center
            - label: Top Right
              value: top_right
            - label: Centre Left
              value: center_left
            - label: Centre
              value: center
            - label: Centre Right
              value: center_right
            - label: Bottom Left
              value: bottom_left
            - label: Bottom Centre
              value: bottom_center
            - label: Bottom Right
              value: bottom_right
    duration:
      name: Duration (seconds)
      description: Optional. Automatically remove the pill after this many seconds.
      required: false
      example: 30
      selector:
        number:
          min: 1
          max: 86400
          unit_of_measurement: seconds

remove_pill:
  name: Remove Pill
  description: Remove a pill from the display.
  fields:
    device_id:
      name: Display
      description: The HA Smart Display to remove the pill from.
      required: true
      selector:
        device:
          integration: ha_smart_display
    pill_id:
      name: Pill ID
      description: ID of the pill to remove.
      required: true
      example: front_door
      selector:
        text:

dismiss_all_pills:
  name: Dismiss All Pills
  description: Remove all pills from the display.
  fields:
    device_id:
      name: Display
      description: The HA Smart Display to remove all pills from.
      required: true
      selector:
        device:
          integration: ha_smart_display

get_pills:
  name: Get Pills
  description: Return the current list of pills on the display. Use response_variable to capture the result.
  fields:
    device_id:
      name: Display
      description: The HA Smart Display to get pills for.
      required: true
      selector:
        device:
          integration: ha_smart_display

get_timers:
  name: Get Timers
  description: Return the current list of timers on the display. Use response_variable to capture the result.
  fields:
    device_id:
      name: Display
      description: The HA Smart Display to get timers for.
      required: true
      selector:
        device:
          integration: ha_smart_display

dismiss_all_timers:
  name: Dismiss All Timers
  description: Remove all timers from the display.
  fields:
    device_id:
      name: Display
      description: The HA Smart Display to remove all timers from.
      required: true
      selector:
        device:
          integration: ha_smart_display

get_alarms:
  name: Get Alarms
  description: Return the current list of alarms on the display. Use response_variable to capture the result.
  fields:
    device_id:
      name: Display
      description: The HA Smart Display to get alarms for.
      required: true
      selector:
        device:
          integration: ha_smart_display

dismiss_all_alarms:
  name: Dismiss All Alarms
  description: Remove all alarms from the display.
  fields:
    device_id:
      name: Display
      description: The HA Smart Display to remove all alarms from.
      required: true
      selector:
        device:
          integration: ha_smart_display
